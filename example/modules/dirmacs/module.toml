[module]
name = "dirmacs"
description = "Dirmacs ecosystem toolchain — local source builds from /opt"

# Packages installed via cargo from local source (cargo build --release in /opt/<name>)
# Use `aegis toolchain status` to check health

[[packages]]
name = "daedra"
install_method = "cargo"
cargo_crate = "daedra"
version_check = "daedra --version"

[[packages]]
name = "nimakai"
install_method = "script"
version_check = "/opt/nimakai/nimakai --version"

[[hooks]]
event = "post-bootstrap"
command = """
echo 'Symlinking dirmacs binaries from /opt...'
for bin in /opt/ares/target/release/ares-server /opt/daedra/target/release/daedra /opt/thulp/target/release/thulp /opt/nimakai/nimakai; do
  name=$(basename $bin)
  if [ -f "$bin" ]; then
    ln -sf "$bin" "$HOME/.local/bin/$name" 2>/dev/null && echo "  linked $name" || true
  fi
done
"""
