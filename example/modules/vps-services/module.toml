[module]
name = "vps-services"
description = "VPS service configuration — templates env files for channel-gateway and doltares from aegis variables"

# Deploy channel-gateway env (templated from aegis variables)
[[configs]]
source = "channel-gateway.env"
target = "/opt/channel-gateway/.env"
strategy = "template"

# Deploy doltares channel env additions (source-able addendum to doltares .env)
[[configs]]
source = "doltares-channels.env"
target = "/opt/doltares/.env.channels"
strategy = "template"

[[hooks]]
event = "post-link"
command = """
echo 'Reloading services after vps-services config update...'
if systemctl is-active --quiet channel-gateway; then
  systemctl restart channel-gateway && echo '  restarted channel-gateway'
fi
if systemctl is-active --quiet doltares; then
  systemctl restart doltares && echo '  restarted doltares'
fi
"""
