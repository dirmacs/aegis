[opencode]
plugin = ["oh-my-opencode@latest"]

[opencode.providers.nvidia]
npm = "@ai-sdk/openai-compatible"
name = "NVIDIA NIM"
base_url = "https://integrate.api.nvidia.com/v1"
api_key_env = "NVIDIA_API_KEY"

# --- Models: ordered by nimakai benchmark latency (2026-03-13) ---

[opencode.models.devstral-2-123b]
provider = "nvidia"
model_id = "mistralai/devstral-2-123b-instruct-2512"
name = "Devstral 2 123B (Daily Driver)"
context_length = 262144
max_output = 32768
temperature = 0.6

[opencode.models.glm5]
provider = "nvidia"
model_id = "z-ai/glm5"
name = "GLM 5"
context_length = 131072
max_output = 131072
temperature = 1.0
top_p = 0.95
thinking = true

[opencode.models.step3-5-flash]
provider = "nvidia"
model_id = "stepfun-ai/step-3.5-flash"
name = "Step 3.5 Flash"
context_length = 262144
max_output = 16384
temperature = 1.0

[opencode.models.minimax-m2-1]
provider = "nvidia"
model_id = "minimaxai/minimax-m2.1"
name = "MiniMax M2.1"
context_length = 131072
max_output = 8192

[opencode.models.glm4-7]
provider = "nvidia"
model_id = "z-ai/glm4.7"
name = "GLM 4.7"
context_length = 131072
max_output = 131072
temperature = 1.0
top_p = 0.95
thinking = true

[opencode.models.kimi-k2-instruct]
provider = "nvidia"
model_id = "moonshotai/kimi-k2-instruct"
name = "Kimi K2 Instruct"
context_length = 131072
max_output = 16384

[opencode.models.qwen3-80b-thinking]
provider = "nvidia"
model_id = "qwen/qwen3-next-80b-a3b-thinking"
name = "Qwen3 80B Thinking"
context_length = 131072
max_output = 16384
thinking = true

[opencode.models.qwen3-5-397b]
provider = "nvidia"
model_id = "qwen/qwen3.5-397b-a17b"
name = "Qwen 3.5 397B VLM"
context_length = 131072
max_output = 16384
thinking = true

[opencode.models.gpt-oss-120b]
provider = "nvidia"
model_id = "openai/gpt-oss-120b"
name = "GPT OSS 120B"
context_length = 131072
max_output = 16384

[opencode.models.llama4-maverick]
provider = "nvidia"
model_id = "meta/llama-4-maverick-17b-128e-instruct"
name = "Llama 4 Maverick"
context_length = 131072
max_output = 16384

[opencode.models.qwen3-coder-480b]
provider = "nvidia"
model_id = "qwen/qwen3-coder-480b-a35b-instruct"
name = "Qwen3 Coder 480B (Heavy)"
context_length = 262144
max_output = 32768
temperature = 0.6

[opencode.models.kimi-k2-thinking]
provider = "nvidia"
model_id = "moonshotai/kimi-k2-thinking"
name = "Kimi K2 Thinking"
context_length = 131072
max_output = 16384
thinking = true

[opencode.models.nemotron-3-super]
provider = "nvidia"
model_id = "nvidia/nemotron-3-super-120b-a12b"
name = "Nemotron 3 Super 120B"
context_length = 1000000
max_output = 16384
temperature = 1.0
top_p = 0.95
thinking = true

[opencode.default_model]
model = "devstral-2-123b"

[opencode.mcp_servers.context7]
type = "remote"
url = "https://mcp.context7.com/mcp"

[opencode.mcp_servers.daedra]
type = "stdio"
command = "daedra"
args = ["serve", "--transport", "stdio", "--quiet"]

[opencode.mcp_servers.chrome-devtools]
type = "stdio"
command = "bunx"
args = ["chrome-devtools-mcp"]

[opencode.mcp_servers.gitmcp]
type = "remote"
url = "https://gitmcp.io/docs"

[opencode.mcp_servers.sequential-thinking]
type = "stdio"
command = "bunx"
args = ["mcp-sequentialthinking-tools"]

[opencode.mcp_servers.clear-thought]
type = "stdio"
command = "bunx"
args = ["@waldzellai/clear-thought"]

[opencode.mcp_servers.stochastic-thinking]
type = "stdio"
command = "bunx"
args = ["@waldzellai/stochasticthinking"]

[opencode.mcp_servers.structured-thinking]
type = "stdio"
command = "bunx"
args = ["structured-thinking"]

[opencode.mcp_servers.shannon-thinking]
type = "stdio"
command = "bunx"
args = ["server-shannon-thinking"]
timeout = 60

[opencode.mcp_servers.tavily]
type = "stdio"
command = "bunx"
args = ["tavily-mcp"]
env = { TAVILY_API_KEY = "$TAVILY_API_KEY" }

# oh-my-opencode agent definitions
[oh_my_opencode]
disabled_hooks = ["category-skill-reminder"]

[oh_my_opencode.agents.local]
model = "devstral-2-123b"

[oh_my_opencode.agents.sisyphus]
model = "devstral-2-123b"
temperature = 0.6
top_p = 0.95
max_tokens = 32768

[oh_my_opencode.agents.hephaestus]
model = "qwen3-coder-480b"

[oh_my_opencode.agents.oracle]
model = "glm5"

[oh_my_opencode.agents.librarian]
model = "glm4-7"

[oh_my_opencode.agents.explore]
model = "step3-5-flash"

[oh_my_opencode.agents.multimodal-looker]
model = "qwen3-5-397b"

[oh_my_opencode.agents.prometheus]
model = "kimi-k2-thinking"

[oh_my_opencode.agents.metis]
model = "gpt-oss-120b"

[oh_my_opencode.agents.momus]
model = "nemotron-3-super"

[oh_my_opencode.agents.atlas]
model = "qwen3-80b-thinking"

[oh_my_opencode.agents.sisyphus-junior]
model = "gpt-oss-120b"
max_tokens = 32768

[oh_my_opencode.categories.visual-engineering]
model = "qwen3-5-397b"

[oh_my_opencode.categories.ultrabrain]
