<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#79c0ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M256 28 L462 120 C462 120 472 320 256 484 C40 320 50 120 50 120 Z"
        fill="url(#innerGrad)"
        stroke="url(#shieldGrad)"
        stroke-width="8"
        stroke-linejoin="round"/>

  <!-- Inner shield border -->
  <path d="M256 60 L434 140 C434 140 442 310 256 452 C70 310 78 140 78 140 Z"
        fill="none"
        stroke="#58a6ff"
        stroke-width="2"
        stroke-opacity="0.4"
        stroke-linejoin="round"/>

  <!-- Gear/cog shape in center (representing config management) -->
  <g transform="translate(256, 230)" fill="none" stroke="#58a6ff" stroke-width="6" stroke-linecap="round">
    <!-- Outer gear teeth -->
    <circle r="60" stroke-opacity="0.6"/>
    <circle r="42" stroke-opacity="0.4"/>
    <circle r="18" fill="#58a6ff" fill-opacity="0.8" stroke="none"/>

    <!-- Gear teeth as short lines radiating outward -->
    <line x1="0" y1="-56" x2="0" y2="-72" stroke-opacity="0.8"/>
    <line x1="48" y1="-28" x2="62" y2="-36" stroke-opacity="0.8"/>
    <line x1="48" y1="28" x2="62" y2="36" stroke-opacity="0.8"/>
    <line x1="0" y1="56" x2="0" y2="72" stroke-opacity="0.8"/>
    <line x1="-48" y1="28" x2="-62" y2="36" stroke-opacity="0.8"/>
    <line x1="-48" y1="-28" x2="-62" y2="-36" stroke-opacity="0.8"/>
  </g>

  <!-- Three horizontal lines inside gear (representing config/TOML) -->
  <g transform="translate(256, 230)" stroke="#e6edf3" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9">
    <line x1="-26" y1="-10" x2="26" y2="-10"/>
    <line x1="-20" y1="0" x2="20" y2="0"/>
    <line x1="-26" y1="10" x2="26" y2="10"/>
  </g>

  <!-- Connection nodes (representing linked configs) -->
  <g fill="#3fb950" fill-opacity="0.9">
    <circle cx="256" cy="140" r="6"/>
    <circle cx="180" cy="320" r="6"/>
    <circle cx="332" cy="320" r="6"/>
  </g>

  <!-- Connection lines from gear to nodes -->
  <g stroke="#3fb950" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="4,4">
    <line x1="256" y1="170" x2="256" y2="146"/>
    <line x1="220" y1="270" x2="186" y2="314"/>
    <line x1="292" y1="270" x2="326" y2="314"/>
  </g>

  <!-- Text: AEGIS -->
  <text x="256" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="42" font-weight="700" fill="#e6edf3" letter-spacing="8">AEGIS</text>
</svg>
